<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referências IC</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Login View -->
        <div id="loginView" class="login-view">
            <div class="login-box">
                <div class="brand" style="margin-bottom: 2rem; text-align: center;">
                    <h1 style="font-size: 2rem;">Referências<span>IC</span></h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Acesso Restrito</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Digite a senha de acesso" required autofocus>
                    </div>
                    <p id="loginErrorMsg" class="login-error-msg" style="display:none;">Senha incorreta. Tente novamente.</p>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Entrar</button>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView" style="display: none;">
            <header class="main-header">
                <div class="header-content">
                    <div class="brand">
                        <h1>Referências<span>IC</span></h1>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Buscar por autor, título...">
                        <button id="searchBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="actions">
                        <button id="addRefBtn" class="btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Adicionar
                        </button>
                        <div class="storage-actions">
                            <button id="logoutBtn" class="btn-logout" title="Sair (Logout)">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                <span>Sair</span>
                            </button>
                            <button id="exportBtn" title="Exportar JSON">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                            </button>
                            <button id="importBtn" title="Importar JSON">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </button>
                            <input type="file" id="importInput" accept=".json" style="display: none;">
                        </div>
                        <span id="syncStatus" class="sync-badge" title="Status de sincronização">☁️</span>

                    </div>
                </div>
            </header>

        <!-- Login Overlay -->

        <main class="container">
            <aside class="sidebar">
                <section class="filter-section">
                    <h3>Labels</h3>
                    <div id="labelList" class="label-list">
                        <!-- Labels will be injected here -->
                    </div>
                </section>
                <section class="stats-section">
                    <h3>Estatísticas</h3>
                    <p id="refCount">Carregando...</p>
                </section>
            </aside>

            <section class="content-area">
                <div class="content-header">
                    <h2 id="currentFilterLabel">Todas as Referências</h2>
                    <div class="sorting">
                        <select id="sortSelect">
                            <option value="date-desc">Mais recentes</option>
                            <option value="date-asc">Mais antigas</option>
                            <option value="author-asc">Autor (A-Z)</option>
                            <option value="title-asc">Título (A-Z)</option>
                        </select>
                    </div>
                </div>
                <div id="referenceGrid" class="reference-grid">
                    <!-- Cards will be injected here -->
                </div>
            </section>
        </main>
        </div><!-- /dashboardView -->

        <!-- Fichamento Read Modal -->
        <div id="fichamentoReadModal" class="modal fich-read-modal">
            <div class="fich-read-content">
                <header class="fich-read-header">
                    <div class="fich-read-meta">
                        <p id="fichReadAuthor" class="fich-read-author"></p>
                        <h2 id="fichReadTitle" class="fich-read-title"></h2>
                        <p id="fichReadSubtitle" class="fich-read-subtitle"></p>
                    </div>
                    <div class="fich-read-actions">
                        <button id="printFichBtn" class="fich-read-print" title="Imprimir Fichamento">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        </button>
                        <button id="closeFichReadModal" class="fich-read-close" title="Fechar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </header>
                <div id="fichReadBody" class="fich-read-body">
                    <!-- Fields injected here -->
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="formModal" class="modal">
            <div class="modal-content">
                <header class="modal-header">
                    <h2 id="modalTitle">Nova Referência</h2>
                    <button class="close-modal">&times;</button>
                </header>
                <form id="referenceForm">
                    <input type="hidden" id="refId">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="autor">Autor *</label>
                            <input type="text" id="autor" required placeholder="Ex: Sobrenome, Nome">
                        </div>
                        <div class="form-group">
                            <label for="titulo">Título *</label>
                            <input type="text" id="titulo" required placeholder="Título principal">
                        </div>
                        <div class="form-group">
                            <label for="subtitulo">Subtítulo</label>
                            <input type="text" id="subtitulo" placeholder="Subtítulo se houver">
                        </div>
                        <div class="form-group">
                            <label for="editora">Editora</label>
                            <input type="text" id="editora" placeholder="Nome da editora">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="edicao">Edição</label>
                                <input type="text" id="edicao" placeholder="Ex: 2ª">
                            </div>
                            <div class="form-group">
                                <label for="data">Data/Ano</label>
                                <input type="text" id="data" placeholder="Ex: 2023">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="local">Local</label>
                            <input type="text" id="local" placeholder="Ex: São Paulo">
                        </div>
                        <div class="form-group">
                            <label for="link">Link (DOI/URL)</label>
                            <input type="url" id="link" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label for="pdf_upload">Upload PDF</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="pdf_upload" accept=".pdf">
                                <div id="pdf_status" class="file-status">Nenhum arquivo selecionado</div>
                                <input type="hidden" id="pdf_data">
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label>Labels</label>
                            <div class="tags-input-container">
                                <div id="activeTags" class="active-tags">
                                    <!-- Tag pills will appear here -->
                                </div>
                                <div class="tag-input-wrapper">
                                    <input type="text" id="tagInputField"
                                        placeholder="Digitar label e apertar Enter...">
                                </div>
                            </div>
                            <div id="suggestedLabels" class="suggested-labels">
                                <!-- Suggested labels will appear here -->
                            </div>
                        </div>
                    </div>
                    <footer class="form-actions">
                        <button type="button" class="btn-secondary close-modal">Cancelar</button>
                        <button type="submit" class="btn-primary">Salvar Referência</button>
                    </footer>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="src/js/app.js"></script>
</body>

</html>
